<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satellite Overpass Finder v2 — Live TLEs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/1.3.0/satellite.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700&display=swap');

  :root {
    --bg: #080b0f;
    --s1: #0e1318;
    --s2: #141c24;
    --s3: #1c2836;
    --border: #1e2d3d;
    --border2: #2a3f55;
    --green: #39d353;
    --blue: #58a6ff;
    --amber: #e3b341;
    --purple: #bc8cff;
    --red: #f85149;
    --cyan: #39c5cf;
    --pink: #ff7eb6;
    --orange: #ffa657;
    --text: #cdd9e5;
    --muted: #545d68;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
  }

  /* Layout */
  .app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    background: var(--s1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: -0.3px;
  }

  .logo span { color: var(--green); }

  .version {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }

  label.field-label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  input[type="text"], input[type="number"], input[type="date"], select {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus { border-color: var(--blue); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Satellite groups */
  .sat-group { margin-bottom: 10px; }

  .sat-group-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sat-group-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .sat-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: all 0.1s;
    user-select: none;
  }

  .sat-item:hover { background: var(--s3); border-color: var(--border); }
  .sat-item.checked { background: var(--s3); border-color: var(--border2); }

  .sat-item input[type="checkbox"] { display: none; }

  .sat-color {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sat-name { flex: 1; font-size: 11px; }
  .sat-tag {
    font-size: 9px;
    color: var(--muted);
    background: var(--s2);
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid var(--border);
  }

  .sat-tle-status {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--muted);
  }

  .sat-tle-status.live { background: var(--green); }
  .sat-tle-status.builtin { background: var(--amber); }
  .sat-tle-status.err { background: var(--red); }

  /* Run button */
  .run-section { padding: 12px 16px; }

  #runBtn {
    width: 100%;
    background: var(--blue);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 9px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }

  #runBtn:hover { opacity: 0.85; }
  #runBtn:disabled { opacity: 0.35; cursor: not-allowed; }

  .fetch-status {
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    min-height: 14px;
    line-height: 1.4;
  }

  .fetch-status .ok { color: var(--green); }
  .fetch-status .err { color: var(--red); }
  .fetch-status .loading { color: var(--amber); }

  /* Main area */
  .main {
    overflow-y: auto;
    padding: 24px 28px;
  }

  /* Empty / loading */
  .centered {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  .centered .icon { font-size: 40px; opacity: 0.2; }

  .progress-bar {
    width: 240px;
    height: 3px;
    background: var(--s2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width 0.2s;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }

  .stat-val {
    font-size: 26px;
    font-weight: 700;
    font-family: var(--display);
    color: var(--blue);
    line-height: 1;
  }

  .stat-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Results tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    padding: 7px 14px;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    user-select: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Calendar */
  .cal-wrap { overflow-x: auto; }

  .cal-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 600px;
  }

  .cal-row {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .cal-month-label {
    font-size: 9px;
    color: var(--muted);
    width: 30px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 6px;
  }

  .cal-day {
    width: 20px;
    height: 20px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    color: var(--muted);
    background: var(--s1);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: border-color 0.1s;
    flex-shrink: 0;
  }

  .cal-day:hover { border-color: var(--blue); z-index: 2; }

  .cal-day[data-n="0"] { background: var(--s1); color: #1e2d3d; }
  .cal-day[data-n="1"] { background: #0d2618; border-color: #1a4430; color: var(--green); }
  .cal-day[data-n="2"] { background: #0d1f30; border-color: #1a3a50; color: var(--blue); }
  .cal-day[data-n="3"] { background: #1c1808; border-color: #3d3010; color: var(--amber); }
  .cal-day[data-n="4"] { background: #200d0d; border-color: #461a1a; color: #ffa657; }

  .cal-day.ov2 { background: #0a2235; border: 2px solid #3a80b0; color: #7dd3fc; }
  .cal-day.ov3 { background: #102a15; border: 2px solid #3a7040; color: #86efac; }
  .cal-day.ov4 { background: #2a1a05; border: 2px solid #805010; color: #fcd34d; }

  /* Pass table */
  .pass-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .pass-table th {
    text-align: left;
    color: var(--muted);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .pass-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--s2);
    vertical-align: middle;
  }

  .pass-table tr:hover td { background: var(--s1); }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 10px;
    border: 1px solid;
  }

  .chip-dot { width: 5px; height: 5px; border-radius: 50%; }

  .overlap-pill {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 700;
    background: #102a15;
    color: var(--green);
    border: 1px solid #2a5030;
  }

  /* Tooltip */
  .tt {
    position: fixed;
    background: var(--s1);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;
    z-index: 999;
    min-width: 190px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    display: none;
  }

  .tt-date { color: var(--blue); font-size: 12px; font-weight: 700; margin-bottom: 8px; }
  .tt-pass { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .tt-pass-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .tt-spread { margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
  }

  .legend-sq {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .info-bar {
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .info-bar b { color: var(--text); }

  /* Timeline strip for best days */
  .best-day-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 14px;
    margin-bottom: 6px;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .bdc-date { font-size: 11px; color: var(--text); }
  .bdc-sats { display: flex; gap: 4px; flex-wrap: wrap; }
  .bdc-spread { font-size: 10px; color: var(--muted); text-align: right; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #1a0808;
    border: 1px solid #5a1515;
    border-radius: 5px;
    padding: 12px 16px;
    color: var(--red);
    font-size: 11px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">OVERPASS<span>_</span>FINDER</div>
      <div class="version">v2 · live TLEs · real SGP4</div>
    </div>

    <div class="section">
      <div class="section-label">Location</div>
      <div class="field">
        <label class="field-label">SITE NAME</label>
        <input type="text" id="locName" placeholder="e.g. TSMC Fab, Phoenix AZ" value="Intel Fab, Chandler AZ">
      </div>
      <div class="row2">
        <div class="field">
          <label class="field-label">LATITUDE</label>
          <input type="number" id="lat" step="0.0001" value="33.3062">
        </div>
        <div class="field">
          <label class="field-label">LONGITUDE</label>
          <input type="number" id="lon" step="0.0001" value="-111.8413">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Date Range</div>
      <div class="row2">
        <div class="field">
          <label class="field-label">FROM</label>
          <input type="date" id="startDate" value="2025-01-01">
        </div>
        <div class="field">
          <label class="field-label">TO</label>
          <input type="date" id="endDate" value="2025-12-31">
        </div>
      </div>
      <div class="field">
        <label class="field-label">OVERLAP THRESHOLD</label>
        <select id="thresh">
          <option value="2">2+ sensors same day</option>
          <option value="3">3+ sensors same day</option>
          <option value="4">4+ sensors same day</option>
        </select>
      </div>
    </div>

    <div class="section" style="flex:1; overflow-y:auto;">
      <div class="section-label">Satellites</div>
      <div id="satList"></div>
    </div>

    <div class="run-section">
      <button id="runBtn" onclick="run()">FETCH TLEs &amp; COMPUTE</button>
      <div class="fetch-status" id="fetchStatus">TLEs fetched from CelesTrak · SGP4 propagation in browser</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="centered">
      <div class="icon">🛰</div>
      <div>Select satellites, enter coordinates, and run.</div>
      <div style="color:#1e2d3d; font-size:10px; margin-top:2px">Live TLEs loaded from CelesTrak · Real SGP4 orbit propagation</div>
    </div>
  </div>
</div>

<div class="tt" id="tt"></div>

<script>
// ─── Satellite catalog ───────────────────────────────────────────────────────
// Each group has: CelesTrak query URL, individual satellites, and display info.
// Swath width (km) is the key parameter for intersection — half-swath is the
// allowable distance from the sub-satellite point to the target.

const SAT_GROUPS = [
  {
    label: 'Free / Academic',
    sats: [
      { id:'S2A',   name:'Sentinel-2A',   color:'#39d353', swath:290, type:'optical', res:'10m',    tle_name:'SENTINEL-2A',    group:'sentinel' },
      { id:'S2B',   name:'Sentinel-2B',   color:'#2ea043', swath:290, type:'optical', res:'10m',    tle_name:'SENTINEL-2B',    group:'sentinel' },
      { id:'S2C',   name:'Sentinel-2C',   color:'#26862e', swath:290, type:'optical', res:'10m',    tle_name:'SENTINEL-2C',    group:'sentinel' },
      { id:'LC8',   name:'Landsat 8',     color:'#58a6ff', swath:185, type:'optical', res:'30m',    tle_name:'LANDSAT 8',      group:'landsat' },
      { id:'LC9',   name:'Landsat 9',     color:'#388bfd', swath:185, type:'optical', res:'30m',    tle_name:'LANDSAT 9',      group:'landsat' },
      { id:'S1A',   name:'Sentinel-1A',   color:'#e3b341', swath:250, type:'SAR',     res:'10m SAR', tle_name:'SENTINEL-1A',   group:'sentinel' },
      { id:'S1B',   name:'Sentinel-1B',   color:'#b08800', swath:250, type:'SAR',     res:'10m SAR', tle_name:'SENTINEL-1B',   group:'sentinel' },
    ]
  },
  {
    label: 'Planet (academic)',
    sats: [
      { id:'SKY',   name:'SkySat (fleet)', color:'#f85149', swath:6.6,  type:'optical', res:'0.5m',  tle_name:'SKYSAT',  group:'planet', multi:true },
      { id:'DOVE',  name:'Dove (sample)',  color:'#ff7eb6', swath:24,   type:'optical', res:'3-5m',  tle_name:'FLOCK',   group:'planet', multi:true },
    ]
  },
  {
    label: 'Commercial SAR',
    sats: [
      { id:'ICEYE', name:'ICEYE (fleet)',  color:'#bc8cff', swath:100, type:'SAR',    res:'1-3m SAR', tle_name:'ICEYE',  group:'iceye',   multi:true },
      { id:'CAP',   name:'Capella Space', color:'#39c5cf', swath:10,  type:'SAR',    res:'0.5m SAR', tle_name:'CAPELLA', group:'capella', multi:true },
    ]
  },
  {
    label: 'High-revisit optical',
    sats: [
      { id:'BSK',   name:'BlackSky (fleet)', color:'#ffa657', swath:30, type:'optical', res:'1m', tle_name:'BLACKSKY', group:'blacksky', multi:true },
    ]
  }
];

// Default selected
const DEFAULT_ON = new Set(['S2A','S2B','S2C','LC8','LC9','S1A','SKY']);

// TLE cache keyed by group
const TLE_CACHE = {};

// Parsed satrec objects: { satId: [satrec, ...] }
const SATRECS = {};

// ─── Build sidebar ───────────────────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('satList');
  SAT_GROUPS.forEach(g => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'sat-group';

    const label = document.createElement('div');
    label.className = 'sat-group-label';
    label.textContent = g.label;
    groupDiv.appendChild(label);

    g.sats.forEach(sat => {
      const item = document.createElement('label');
      item.className = 'sat-item' + (DEFAULT_ON.has(sat.id) ? ' checked' : '');
      item.dataset.satId = sat.id;
      item.innerHTML = `
        <input type="checkbox" value="${sat.id}" ${DEFAULT_ON.has(sat.id) ? 'checked' : ''}>
        <div class="sat-color" style="background:${sat.color}"></div>
        <span class="sat-name">${sat.name}</span>
        <span class="sat-tag">${sat.res}</span>
        <div class="sat-tle-status" id="tle-status-${sat.id}" title="TLE not yet fetched"></div>
      `;
      item.addEventListener('change', () => {
        item.classList.toggle('checked', item.querySelector('input').checked);
      });
      groupDiv.appendChild(item);
    });

    container.appendChild(groupDiv);
  });
}

// ─── TLE fetching ────────────────────────────────────────────────────────────
// CelesTrak groups we can hit via CORS-friendly endpoint
const CELESTRAK_GROUPS = {
  sentinel:  'https://celestrak.org/NORAD/elements/gp.php?GROUP=sentinel&FORMAT=json',
  landsat:   'https://celestrak.org/NORAD/elements/gp.php?GROUP=resource&FORMAT=json',
  planet:    'https://celestrak.org/NORAD/elements/gp.php?GROUP=planet&FORMAT=json',
  iceye:     'https://celestrak.org/NORAD/elements/gp.php?NAME=ICEYE&FORMAT=json',
  capella:   'https://celestrak.org/NORAD/elements/gp.php?NAME=CAPELLA&FORMAT=json',
  blacksky:  'https://celestrak.org/NORAD/elements/gp.php?NAME=BLACKSKY&FORMAT=json',
};

async function fetchTLEGroup(groupKey) {
  if (TLE_CACHE[groupKey]) return TLE_CACHE[groupKey];
  const url = CELESTRAK_GROUPS[groupKey];
  if (!url) return null;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`CelesTrak ${groupKey}: ${resp.status}`);
  const data = await resp.json();
  TLE_CACHE[groupKey] = data;
  return data;
}

function omm2satrec(omm) {
  // satellite.js v1.3 uses twoline2satrec — need to convert OMM to TLE lines
  // Or we can build satrec manually. Simpler: generate fake TLE from OMM fields.
  // Use the tle_name approach: find matching TLEs from group fetch
  // Actually satellite.js 1.3 only has twoline2satrec. We need TLE format.
  // CelesTrak also serves TLE format — easier to use that for v1.3 compat.
  return null; // placeholder
}

// Fetch TLE format (text) and parse into satrec array
async function fetchAndParseTLEs(satDef) {
  const groupKey = satDef.group;
  const url = CELESTRAK_GROUPS[groupKey]?.replace('FORMAT=json', 'FORMAT=tle');
  if (!url) return [];

  let tleText;
  if (TLE_CACHE[groupKey + '_tle']) {
    tleText = TLE_CACHE[groupKey + '_tle'];
  } else {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`CelesTrak ${groupKey} TLE: ${resp.status}`);
    tleText = await resp.text();
    TLE_CACHE[groupKey + '_tle'] = tleText;
  }

  // Parse TLE lines — format is:
  // name\n
  // 1 ...\n
  // 2 ...\n
  const lines = tleText.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const results = [];
  for (let i = 0; i + 2 < lines.length; i += 3) {
    const name = lines[i];
    const line1 = lines[i+1];
    const line2 = lines[i+2];
    if (!line1.startsWith('1 ') || !line2.startsWith('2 ')) continue;

    // Filter by satellite name keyword
    const nameUpper = name.toUpperCase();
    const keyword = satDef.tle_name.toUpperCase();

    // Special handling: LANDSAT group includes many sats, filter strictly
    if (satDef.group === 'landsat') {
      if (!nameUpper.includes(satDef.tle_name.toUpperCase())) continue;
    } else {
      if (!nameUpper.includes(keyword)) continue;
    }

    try {
      const satrec = satellite.twoline2satrec(line1, line2);
      results.push({ satrec, name });
    } catch(e) { /* skip bad TLE */ }
  }
  return results;
}

// ─── SGP4 ground intersection check ─────────────────────────────────────────
// For each minute of a day, propagate satellite position and check if the
// target lat/lon is within swath/2 km of the sub-satellite point.
// We check every 60 seconds (one orbital period ~90min, so 1440 checks/day).

const DEG2RAD = Math.PI / 180;
const RAD2DEG = 180 / Math.PI;
const EARTH_R = 6371; // km

function haversineKm(lat1, lon1, lat2, lon2) {
  const dLat = (lat2 - lat1) * DEG2RAD;
  const dLon = (lon2 - lon1) * DEG2RAD;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*DEG2RAD)*Math.cos(lat2*DEG2RAD)*Math.sin(dLon/2)**2;
  return 2 * EARTH_R * Math.asin(Math.sqrt(a));
}

// Check if a satrec passes over (lat, lon) on a given UTC date
// Returns pass info or null
function checkDayPass(satrec, targetLat, targetLon, swathKmHalf, dateUtc) {
  const startMs = dateUtc.getTime();
  // Check every 2 minutes (720 samples/day — fast enough for wide swaths)
  // For narrow swaths (SkySat 6.6km), check every 30s
  const stepSec = swathKmHalf < 15 ? 30 : 120;
  const steps = (24 * 3600) / stepSec;

  let bestPass = null;

  for (let i = 0; i < steps; i++) {
    const t = new Date(startMs + i * stepSec * 1000);
    const pv = satellite.propagate(satrec, t);
    if (!pv || !pv.position) continue;

    const gmst = satellite.gstimeFromDate(t);
    const geo = satellite.eciToGeodetic(pv.position, gmst);
    const satLat = geo.latitude * RAD2DEG;
    const satLon = geo.longitude * RAD2DEG;

    const dist = haversineKm(targetLat, targetLon, satLat, satLon);
    if (dist < swathKmHalf) {
      // Found a pass — record UTC time and distance
      const utcHour = t.getUTCHours() + t.getUTCMinutes()/60 + t.getUTCSeconds()/3600;
      if (!bestPass || dist < bestPass.dist) {
        bestPass = { utcHour, dist, satLat, satLon };
      }
    }
  }
  return bestPass;
}

// ─── Main analysis ───────────────────────────────────────────────────────────
let running = false;

async function run() {
  if (running) return;
  running = true;
  const btn = document.getElementById('runBtn');
  btn.disabled = true;

  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const startDate = new Date(document.getElementById('startDate').value + 'T00:00:00Z');
  const endDate   = new Date(document.getElementById('endDate').value + 'T00:00:00Z');
  const thresh    = parseInt(document.getElementById('thresh').value);
  const locName   = document.getElementById('locName').value || `${lat},${lon}`;

  if (isNaN(lat) || isNaN(lon)) { showErr('Invalid coordinates'); running=false; btn.disabled=false; return; }
  const dayRange = (endDate - startDate) / 86400000;
  if (dayRange < 1) { showErr('End date must be after start date'); running=false; btn.disabled=false; return; }
  if (dayRange > 400) { showErr('Please limit to ~1 year for browser performance'); running=false; btn.disabled=false; return; }

  // Which sats are selected?
  const selectedSatDefs = [];
  SAT_GROUPS.forEach(g => g.sats.forEach(s => {
    const el = document.querySelector(`.sat-item[data-sat-id="${s.id}"] input`);
    if (el && el.checked) selectedSatDefs.push(s);
  }));

  if (selectedSatDefs.length === 0) { showErr('Select at least one satellite'); running=false; btn.disabled=false; return; }

  showLoading('Fetching live TLEs from CelesTrak…', 0);

  // Fetch TLEs for all required groups
  const neededGroups = [...new Set(selectedSatDefs.map(s => s.group))];
  const fetchErrors = [];
  let fetchedCount = 0;

  for (const gk of neededGroups) {
    try {
      setStatus(`<span class="loading">⟳ Fetching ${gk} TLEs…</span>`);
      await fetchAndParseTLEs({ group: gk, tle_name: gk, id: gk }); // prime cache
      fetchedCount++;
    } catch(e) {
      fetchErrors.push(gk + ': ' + e.message);
    }
  }

  // Parse satrecs for selected satellites
  for (const satDef of selectedSatDefs) {
    const statusEl = document.getElementById('tle-status-' + satDef.id);
    try {
      const recs = await fetchAndParseTLEs(satDef);
      if (recs.length > 0) {
        SATRECS[satDef.id] = recs;
        if (statusEl) { statusEl.className = 'sat-tle-status live'; statusEl.title = `${recs.length} TLE(s) loaded live`; }
      } else {
        throw new Error('No matching TLEs found');
      }
    } catch(e) {
      fetchErrors.push(`${satDef.name}: ${e.message}`);
      if (statusEl) { statusEl.className = 'sat-tle-status err'; statusEl.title = e.message; }
      SATRECS[satDef.id] = null;
    }
  }

  // Generate dates
  const dates = [];
  for (let d = new Date(startDate); d <= endDate; d.setUTCDate(d.getUTCDate()+1)) {
    dates.push(new Date(d));
  }

  const totalDays = dates.length;
  const totalSats = selectedSatDefs.filter(s => SATRECS[s.id]?.length > 0).length;

  showLoading(`Computing passes for ${totalDays} days × ${totalSats} satellites…`, 5);

  // Compute passes — this is the heavy loop
  // byDate: { 'YYYY-MM-DD': [ { satDef, utcHour, dist, satrec_name } ] }
  const byDate = {};

  let processed = 0;
  const totalWork = selectedSatDefs.length;

  for (const satDef of selectedSatDefs) {
    const recs = SATRECS[satDef.id];
    if (!recs) { processed++; continue; }

    setStatus(`<span class="loading">⟳ Computing ${satDef.name} (${processed+1}/${totalWork})…</span>`);
    showLoading(`Computing ${satDef.name}…`, 5 + (processed/totalWork)*90);

    // Yield to browser between each satellite
    await new Promise(r => setTimeout(r, 0));

    const swathHalf = satDef.swath / 2;

    for (const date of dates) {
      const dateKey = date.toISOString().slice(0,10);

      // For multi-satellite constellations (Planet, ICEYE), check each individual sat
      // For large fleets, checking all ~200 Doves is expensive — sample strategically
      const recsToCheck = recs.length > 20 ? sampleRecs(recs, satDef, lat, lon) : recs;

      for (const rec of recsToCheck) {
        const pass = checkDayPass(rec.satrec, lat, lon, swathHalf, date);
        if (pass) {
          if (!byDate[dateKey]) byDate[dateKey] = [];
          // Avoid duplicate sensor-type entries on same day
          const alreadyHasThisSat = byDate[dateKey].some(p => p.satId === satDef.id);
          if (!alreadyHasThisSat) {
            byDate[dateKey].push({
              satId: satDef.id,
              satDef,
              utcHour: pass.utcHour,
              dist: pass.dist,
              satName: rec.name,
            });
          }
          break; // one pass per sat per day is enough
        }
      }
    }

    processed++;
  }

  showLoading('Rendering results…', 98);
  await new Promise(r => setTimeout(r, 0));

  renderResults({ byDate, dates, thresh, locName, lat, lon, selectedSatDefs, fetchErrors });
  setStatus(fetchErrors.length > 0
    ? `<span class="err">⚠ ${fetchErrors.length} fetch error(s) — see results</span>`
    : `<span class="ok">✓ Live TLEs · SGP4 propagation · ${Object.keys(byDate).length} pass-days found</span>`);
  running = false;
  btn.disabled = false;
}

// For large constellations, pick a strategic sample of satrecs
// We want sats at different orbital planes (different RAAN)
function sampleRecs(recs, satDef, lat, lon) {
  // Sort by inclination and pick every Nth
  const n = Math.min(recs.length, 30);
  const step = Math.floor(recs.length / n);
  return recs.filter((_, i) => i % step === 0).slice(0, n);
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function renderResults({ byDate, dates, thresh, locName, lat, lon, selectedSatDefs, fetchErrors }) {
  const totalDays = dates.length;
  const daysWithAny = Object.keys(byDate).length;
  const overlapDays = Object.entries(byDate).filter(([,passes]) => passes.length >= thresh);
  const maxSensors = Math.max(0, ...Object.values(byDate).map(p=>p.length));

  // Calendar
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthMap = {};
  dates.forEach(d => {
    const k = `${d.getUTCFullYear()}-${d.getUTCMonth()}`;
    if (!monthMap[k]) monthMap[k] = { year: d.getUTCFullYear(), month: d.getUTCMonth(), days: [] };
    monthMap[k].days.push(d);
  });

  let calHTML = '<div class="cal-grid">';
  for (const { year, month, days } of Object.values(monthMap)) {
    calHTML += `<div class="cal-row"><div class="cal-month-label">${MONTHS[month]}</div>`;
    for (const d of days) {
      const dk = d.toISOString().slice(0,10);
      const passes = byDate[dk] || [];
      const n = passes.length;
      let cls = 'cal-day';
      if (n >= thresh + 1) cls += ' ov4';
      else if (n >= thresh) cls += ' ov2';

      const passData = JSON.stringify(passes.map(p => ({ name: p.satDef.name, utcHour: p.utcHour, color: p.satDef.color, type: p.satDef.type, dist: Math.round(p.dist) })));
      calHTML += `<div class="${cls}" data-n="${Math.min(n,4)}" data-date="${dk}" data-passes='${passData.replace(/'/g,'&#39;')}'>${d.getUTCDate()}</div>`;
    }
    calHTML += '</div>';
  }
  calHTML += '</div>';

  // Legend
  const legendHTML = selectedSatDefs.map(s => `
    <div class="legend-item">
      <div class="legend-sq" style="background:${s.color}"></div>
      <span>${s.id}</span>
    </div>
  `).join('') + `
    <div class="legend-item">
      <div class="legend-sq" style="background:#0a2235; border:2px solid #3a80b0"></div>
      <span>${thresh}+ sensors</span>
    </div>
  `;

  // Best overlap days
  const sortedOverlap = overlapDays.sort((a,b) => b[1].length - a[1].length || a[0].localeCompare(b[0]));
  const bestRows = sortedOverlap.slice(0,50).map(([dk, passes]) => {
    const chips = passes.map(p =>
      `<span class="chip" style="color:${p.satDef.color};border-color:${p.satDef.color}40;background:${p.satDef.color}10">
        <span class="chip-dot" style="background:${p.satDef.color}"></span>${p.satId}
      </span>`
    ).join('');
    const times = passes.map(p => fmtHour(p.utcHour)).join(' / ');
    const spread = passes.length > 1 ? (() => {
      const hrs = passes.map(p=>p.utcHour).sort((a,b)=>a-b);
      return `Δ${(hrs[hrs.length-1]-hrs[0]).toFixed(1)}h`;
    })() : '—';
    return `<tr>
      <td>${dk}</td>
      <td>${chips} <span class="overlap-pill">${passes.length}×</span></td>
      <td style="color:var(--muted)">${times}</td>
      <td style="color:var(--muted)">${spread}</td>
    </tr>`;
  }).join('');

  // Error section
  const errHTML = fetchErrors.length > 0
    ? `<div class="error-box" style="margin-bottom:16px">⚠ Some TLE fetches failed (CORS or satellite not in catalog):<br>${fetchErrors.map(e=>`· ${e}`).join('<br>')}</div>`
    : '';

  document.getElementById('main').innerHTML = `
    ${errHTML}
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">${Math.round(daysWithAny/totalDays*100)}%</div>
        <div class="stat-sub">days with any coverage</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--green)">${overlapDays.length}</div>
        <div class="stat-sub">days with ${thresh}+ sensors</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--amber)">${maxSensors}</div>
        <div class="stat-sub">max sensors on one day</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--purple)">${Math.round(overlapDays.length / (totalDays/365))}</div>
        <div class="stat-sub">overlap days per year</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('cal')">Calendar</div>
      <div class="tab" onclick="switchTab('list')">Best overlap days</div>
    </div>

    <div class="tab-content active" id="tab-cal">
      <div class="legend">${legendHTML}</div>
      <div class="info-bar">
        <b>Coverage calendar for ${locName}</b> (${lat.toFixed(4)}°, ${lon.toFixed(4)}°) · 
        Darker = more sensors · Blue border = ${thresh}+ sensors same day · 
        Hover days for pass times · <b>SGP4-computed from live TLEs</b>
      </div>
      <div class="cal-wrap">${calHTML}</div>
    </div>

    <div class="tab-content" id="tab-list">
      <div class="info-bar">Days with ${thresh}+ sensors covering this location — sorted by sensor count. Times are UTC.</div>
      ${overlapDays.length === 0
        ? '<div style="color:var(--muted);padding:20px 0">No multi-sensor overlap days found. Try lowering threshold or expanding date range.</div>'
        : `<table class="pass-table">
            <thead><tr><th>Date</th><th>Sensors</th><th>UTC Times</th><th>Time Spread</th></tr></thead>
            <tbody>${bestRows}</tbody>
          </table>`
      }
    </div>
  `;

  // Tooltip setup
  const tt = document.getElementById('tt');
  document.querySelectorAll('.cal-day[data-passes]').forEach(cell => {
    cell.addEventListener('mousemove', e => {
      let passes;
      try { passes = JSON.parse(cell.dataset.passes); } catch { return; }
      if (!passes.length) { tt.style.display='none'; return; }
      const dk = cell.dataset.date;
      let html = `<div class="tt-date">${dk}</div>`;
      passes.forEach(p => {
        html += `<div class="tt-pass"><div class="tt-pass-dot" style="background:${p.color}"></div>${p.name}<span style="margin-left:auto;color:var(--muted)">${fmtHour(p.utcHour)}</span></div>`;
      });
      if (passes.length > 1) {
        const hrs = passes.map(p=>p.utcHour).sort((a,b)=>a-b);
        const spread = (hrs[hrs.length-1]-hrs[0]).toFixed(1);
        html += `<div class="tt-spread">Time spread: <b>${spread}h</b> between first and last</div>`;
      }
      tt.innerHTML = html;
      tt.style.display = 'block';
      tt.style.left = (e.clientX+14)+'px';
      tt.style.top  = (e.clientY-10)+'px';
    });
    cell.addEventListener('mouseleave', () => { tt.style.display='none'; });
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['cal','list'][i]===name));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function fmtHour(h) {
  const hh = Math.floor(h), mm = Math.floor((h-hh)*60);
  return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')} UTC`;
}

function showLoading(msg, pct) {
  document.getElementById('main').innerHTML = `
    <div class="centered">
      <div class="spinner"></div>
      <div>${msg}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:var(--muted)">Computing real SGP4 orbits — this takes a moment</div>
    </div>
  `;
}

function showErr(msg) {
  document.getElementById('main').innerHTML = `<div class="error-box" style="margin:24px">${msg}</div>`;
}

function setStatus(html) {
  document.getElementById('fetchStatus').innerHTML = html;
}

buildSidebar();
</script>
</body>
</html>
